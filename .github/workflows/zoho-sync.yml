# Zoho inbox sync trigger.
#
# Pulls new lead replies from Sarah's Zoho mailbox into the correspondence log so
# they surface in the admin inbox. The MMS Vercel project is on the Hobby plan
# (Vercel cron is daily-only there), so this is driven from GitHub Actions. All
# the logic lives server-side in app/api/cron/zoho-sync/route.ts (IMAP fetch ->
# match sender to a lead -> insert a messages row -> nudge to-contact ->
# contacted). Scheduled runs are best-effort; trigger by hand from the Actions
# tab anytime (workflow_dispatch).

name: zoho-sync

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes (best-effort on GitHub)
  workflow_dispatch: {} # manual run button

concurrency:
  group: zoho-sync
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Zoho inbox sync
        run: |
          echo "Pinging zoho-sync..."
          BODY=$(curl -sS -m 120 -w $'\n%{http_code}' \
            ${CRON_SECRET:+-H "Authorization: Bearer $CRON_SECRET"} \
            "https://modernmustardseed.com/api/cron/zoho-sync")
          CODE=$(printf '%s' "$BODY" | tail -n1)
          JSON=$(printf '%s' "$BODY" | sed '$d')
          echo "HTTP $CODE"
          echo "Response: $JSON"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "::error::zoho-sync returned HTTP $CODE"
            exit 1
          fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
